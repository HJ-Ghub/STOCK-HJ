<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7fbf8" />
  <title>보관함 사진정리</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root {
      --bg: #f7fbf8;
      --panel: #ffffff;
      --text: #18231f;
      --muted: #63736d;
      --line: #d9e5de;
      --accent: #2f7d68;
      --danger: #b23b2f;
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      min-height: 42px;
      border-radius: 12px;
      padding: 9px 12px;
      font-weight: 800;
    }

    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.danger { color: var(--danger); border-color: #efc2bb; background: #fff7f5; }

    input, textarea, select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      font-size: 16px;
    }

    input[type="file"] {
      padding: 8px;
      background: #fff;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
      line-height: 1.45;
    }

    label, .field-title {
      display: grid;
      gap: 6px;
      font-weight: 850;
      color: #30413a;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(247, 251, 248, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .head {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 22px; }
    h2 { font-size: 18px; }
    h3 { font-size: 16px; }

    .status {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 800;
    }

    .search-row, .tabs, .actions, .photo-inputs, .box-row {
      display: grid;
      gap: 8px;
    }

    .search-row { grid-template-columns: 1fr auto; }
    .tabs, .actions, .photo-inputs { grid-template-columns: 1fr 1fr; }
    .box-row { grid-template-columns: 1fr auto; }

    .tab.active { background: #e8f4ef; border-color: #add2c4; color: #1f6654; }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 12px;
      padding-bottom: 80px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 12px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: 0 8px 24px rgba(26, 44, 36, .06);
    }

    .form-grid, .content, .tools, .item-card, .box-card {
      display: grid;
      gap: 10px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .photo-box {
      border: 1px dashed #acc4b7;
      border-radius: var(--radius);
      min-height: 190px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #fbfdfb;
      color: var(--muted);
      text-align: center;
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      max-height: 280px;
      object-fit: contain;
      display: none;
      background: #fff;
    }

    .photo-box.has-photo img { display: block; }
    .photo-box.has-photo .photo-empty { display: none; }
    .photo-empty { padding: 18px; display: grid; gap: 5px; }
    .photo-empty strong { color: var(--text); }

    .file-field {
      display: grid;
      gap: 6px;
      font-size: 14px;
      font-weight: 850;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdfb;
      padding: 10px;
    }

    .metric .label { color: var(--muted); font-size: 12px; font-weight: 800; }
    .metric .value { margin-top: 3px; font-size: 22px; font-weight: 900; }

    .items-grid, .boxes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
    }

    .item-card, .box-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .item-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      object-fit: cover;
      background: #eef4f0;
    }

    .item-title {
      font-size: 16px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .item-meta, .tags {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .hidden { display: none !important; }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      background: #fbfdfb;
    }

    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, 1fr); }
      .photo-inputs, .actions { grid-template-columns: 1fr; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="head">
      <div class="title-row">
        <h1>보관함 사진정리</h1>
        <span class="status" id="statusText">불러오는 중</span>
      </div>
      <div class="search-row">
        <input id="searchInput" type="search" placeholder="물건명, 설명, 태그, 보관박스 검색" autocomplete="off" />
        <button id="clearSearchBtn" type="button">지우기</button>
      </div>
      <nav class="tabs" aria-label="보기 선택">
        <button class="tab active" type="button" data-view="items">전체물건</button>
        <button class="tab" type="button" data-view="boxes">보관박스</button>
        <button class="tab" type="button" data-view="tools">백업</button>
      </nav>
    </div>
  </header>

  <main class="app">
    <div class="layout">
      <section class="panel" aria-label="물건 등록">
        <div class="section-title">
          <h2 id="formTitle">물건 등록</h2>
          <button id="resetFormBtn" type="button">새로</button>
        </div>
        <form class="form-grid" id="itemForm">
          <div class="photo-box" id="photoBox">
            <img id="photoPreview" alt="선택한 물건 사진 미리보기" />
            <div class="photo-empty">
              <strong>사진 없음</strong>
              <span>아래 기본 파일 선택 버튼을 눌러 주세요.</span>
            </div>
          </div>
          <div class="photo-inputs">
            <label class="file-field">카메라 촬영
              <input id="cameraInput" type="file" accept="image/*" capture="environment" />
            </label>
            <label class="file-field">사진앨범 선택
              <input id="photoInput" type="file" accept="image/*" />
            </label>
          </div>
          <button id="removePhotoBtn" class="danger hidden" type="button">사진 삭제</button>
          <label>물건명
            <input id="itemName" required placeholder="예: 검정 니트, 충전기, 겨울장갑" />
          </label>
          <label>설명
            <textarea id="itemDesc" placeholder="색상, 위치, 같이 들어있는 물건 등"></textarea>
          </label>
          <label>태그
            <input id="itemTags" placeholder="예: 겨울옷, 검정, 니트" />
          </label>
          <label>보관박스
            <select id="boxSelect"></select>
          </label>
          <div class="box-row">
            <input id="newBoxName" placeholder="새 박스명" />
            <button id="addBoxBtn" type="button">추가</button>
          </div>
          <div class="actions">
            <button class="primary" type="submit">저장</button>
            <button id="cancelEditBtn" class="hidden" type="button">수정취소</button>
            <button id="deleteEditBtn" class="danger hidden" type="button">삭제</button>
          </div>
          <p class="hint">휴대폰에서 사진이 안 열리면 이 페이지를 Safari/Chrome 새 탭에서 열고, 브라우저의 카메라/사진 권한을 허용해 주세요.</p>
        </form>
      </section>

      <section class="content">
        <section class="summary" aria-label="요약">
          <div class="metric"><div class="label">전체 물건</div><div class="value" id="metricItems">0</div></div>
          <div class="metric"><div class="label">보관박스</div><div class="value" id="metricBoxes">0</div></div>
          <div class="metric"><div class="label">사진 있음</div><div class="value" id="metricPhotos">0</div></div>
          <div class="metric"><div class="label">검색 결과</div><div class="value" id="metricResults">0</div></div>
        </section>

        <section id="itemsView" class="panel">
          <div class="section-title">
            <h2>전체 물건</h2>
            <span class="hint" id="itemsHint">최근 등록순</span>
          </div>
          <div class="items-grid" id="itemsGrid"></div>
        </section>

        <section id="boxesView" class="panel hidden">
          <div class="section-title">
            <h2>보관박스</h2>
            <span class="hint">박스별 물건 수</span>
          </div>
          <div class="boxes-grid" id="boxesGrid"></div>
        </section>

        <section id="toolsView" class="panel hidden">
          <div class="section-title">
            <h2>백업</h2>
            <span class="hint">사진 포함 JSON</span>
          </div>
          <div class="tools">
            <button id="exportBtn" type="button">백업 내보내기</button>
            <button id="importBtn" type="button">백업 가져오기</button>
            <input id="importFile" type="file" accept="application/json,.json" class="hidden" />
            <button id="clearAllBtn" class="danger" type="button">전체 삭제</button>
            <p class="hint">기존 보관앱 데이터는 최대한 그대로 읽어옵니다. 문제가 생기면 백업 파일로 복구할 수 있습니다.</p>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script>
    (() => {
      'use strict';

      const DB_NAME = 'storageBoxPhotoApp.v1';
      const DB_VERSION = 1;
      const STORE = 'state';
      const STATE_KEY = 'app';
      const DEFAULT_BOX = '미지정';

      const $ = (id) => document.getElementById(id);
      const els = {
        status: $('statusText'),
        tabs: Array.from(document.querySelectorAll('.tab')),
        search: $('searchInput'),
        clearSearch: $('clearSearchBtn'),
        form: $('itemForm'),
        formTitle: $('formTitle'),
        resetForm: $('resetFormBtn'),
        photoBox: $('photoBox'),
        photoPreview: $('photoPreview'),
        photoInput: $('photoInput'),
        cameraInput: $('cameraInput'),
        removePhoto: $('removePhotoBtn'),
        itemName: $('itemName'),
        itemDesc: $('itemDesc'),
        itemTags: $('itemTags'),
        boxSelect: $('boxSelect'),
        newBoxName: $('newBoxName'),
        addBox: $('addBoxBtn'),
        cancelEdit: $('cancelEditBtn'),
        deleteEdit: $('deleteEditBtn'),
        metricItems: $('metricItems'),
        metricBoxes: $('metricBoxes'),
        metricPhotos: $('metricPhotos'),
        metricResults: $('metricResults'),
        itemsView: $('itemsView'),
        boxesView: $('boxesView'),
        toolsView: $('toolsView'),
        itemsGrid: $('itemsGrid'),
        boxesGrid: $('boxesGrid'),
        itemsHint: $('itemsHint'),
        exportBtn: $('exportBtn'),
        importBtn: $('importBtn'),
        importFile: $('importFile'),
        clearAll: $('clearAllBtn')
      };

      let dbPromise = null;
      let app = emptyApp();
      let currentPhoto = '';
      let editingId = '';
      let currentView = 'items';
      let saveTimer = null;

      function makeId(prefix) {
        return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
      }

      function emptyApp() {
        return {
          boxes: [{ id: makeId('box'), name: DEFAULT_BOX, note: '', createdAt: Date.now(), updatedAt: Date.now() }],
          items: [],
          deletedItems: {},
          updatedAt: Date.now()
        };
      }

      function splitTags(value) {
        return String(value || '').split(',').map(tag => tag.trim()).filter(Boolean);
      }

      function esc(value) {
        return String(value ?? '').replace(/[&<>"']/g, ch => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[ch]));
      }

      function openDb() {
        if (dbPromise) return dbPromise;
        dbPromise = new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = () => {
            if (!req.result.objectStoreNames.contains(STORE)) req.result.createObjectStore(STORE);
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error || new Error('IndexedDB 열기 실패'));
        });
        return dbPromise;
      }

      async function readState() {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, 'readonly');
          const req = tx.objectStore(STORE).get(STATE_KEY);
          req.onsuccess = () => resolve(req.result || null);
          req.onerror = () => reject(req.error || new Error('데이터 읽기 실패'));
        });
      }

      async function writeState() {
        const db = await openDb();
        const payload = normalizeApp(JSON.parse(JSON.stringify(app)));
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, 'readwrite');
          tx.objectStore(STORE).put(payload, STATE_KEY);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error || new Error('데이터 저장 실패'));
        });
      }

      function normalizeApp(data) {
        const next = data && typeof data === 'object' ? data : emptyApp();
        next.boxes = Array.isArray(next.boxes) ? next.boxes : [];
        next.items = Array.isArray(next.items) ? next.items : [];
        next.deletedItems = next.deletedItems && typeof next.deletedItems === 'object' ? next.deletedItems : {};
        if (!next.boxes.length) next.boxes.push({ id: makeId('box'), name: DEFAULT_BOX, note: '', createdAt: Date.now(), updatedAt: Date.now() });
        if (!next.boxes.some(box => box.name === DEFAULT_BOX)) {
          next.boxes.unshift({ id: makeId('box'), name: DEFAULT_BOX, note: '', createdAt: Date.now(), updatedAt: Date.now() });
        }
        next.boxes = next.boxes.map(box => ({
          id: String(box.id || makeId('box')),
          name: String(box.name || DEFAULT_BOX),
          note: String(box.note || ''),
          createdAt: Number(box.createdAt || Date.now()),
          updatedAt: Number(box.updatedAt || box.createdAt || Date.now())
        }));
        const validBoxIds = new Set(next.boxes.map(box => box.id));
        const defaultBoxId = (next.boxes.find(box => box.name === DEFAULT_BOX) || next.boxes[0]).id;
        next.items = next.items.map(item => ({
          id: String(item.id || makeId('item')),
          name: String(item.name || ''),
          desc: String(item.desc || ''),
          tags: Array.isArray(item.tags) ? item.tags.map(String) : splitTags(item.tags || ''),
          boxId: validBoxIds.has(item.boxId) ? item.boxId : defaultBoxId,
          photo: String(item.photo || ''),
          createdAt: Number(item.createdAt || Date.now()),
          updatedAt: Number(item.updatedAt || item.createdAt || Date.now())
        })).filter(item => item.name || item.photo || item.desc);
        next.updatedAt = Number(next.updatedAt || Date.now());
        return next;
      }

      function scheduleSave() {
        app.updatedAt = Date.now();
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          writeState().then(updateStatus).catch(err => {
            console.error(err);
            els.status.textContent = '저장 실패';
          });
        }, 80);
      }

      function updateStatus() {
        els.status.textContent = `저장됨 ${new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}`;
      }

      async function unregisterWorkers() {
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(reg => reg.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.filter(key => key.startsWith('storage-box-app-')).map(key => caches.delete(key)));
          }
        } catch (err) {
          console.warn('cache cleanup skipped', err);
        }
      }

      function placeholderSvg() {
        return 'data:image/svg+xml;utf8,' + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300"><rect width="300" height="300" fill="#edf4ef"/><path d="M72 190h156l-38-48-28 32-22-24z" fill="#91a69b"/><circle cx="105" cy="106" r="22" fill="#b6c8bf"/></svg>'
        );
      }

      function loadImage(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error('사진 표시 실패'));
          img.src = url;
        });
      }

      async function compressImage(file) {
        if (!file || !/^image\//i.test(file.type || '')) throw new Error('사진 파일만 선택해 주세요.');
        const objectUrl = URL.createObjectURL(file);
        try {
          const img = await loadImage(objectUrl);
          const maxSide = 1100;
          const scale = Math.min(1, maxSide / Math.max(img.naturalWidth || img.width, img.naturalHeight || img.height));
          const width = Math.max(1, Math.round((img.naturalWidth || img.width) * scale));
          const height = Math.max(1, Math.round((img.naturalHeight || img.height) * scale));
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          if (!ctx) throw new Error('사진 변환 실패');
          ctx.drawImage(img, 0, 0, width, height);
          return canvas.toDataURL('image/jpeg', .78);
        } finally {
          URL.revokeObjectURL(objectUrl);
        }
      }

      function photoErrorMessage(file, err) {
        const type = file?.type || '형식 알 수 없음';
        const size = file?.size ? `${Math.round(file.size / 1024)}KB` : '크기 알 수 없음';
        const reason = err?.message || String(err || '');
        return `사진을 불러오지 못했습니다.\n형식: ${type}\n크기: ${size}\n원인: ${reason}\n\n휴대폰 카메라가 HEIC로 저장 중이면 JPG/JPEG로 바꾼 뒤 다시 시도해 주세요.`;
      }

      function setPhoto(dataUrl) {
        currentPhoto = dataUrl || '';
        els.photoPreview.src = currentPhoto || '';
        els.photoBox.classList.toggle('has-photo', Boolean(currentPhoto));
        els.removePhoto.classList.toggle('hidden', !currentPhoto);
      }

      async function handlePhotoInput(input) {
        const file = input.files && input.files[0];
        if (!file) return;
        const previous = els.status.textContent;
        try {
          els.status.textContent = '사진 처리 중';
          setPhoto(await compressImage(file));
          els.status.textContent = '사진 준비됨';
        } catch (err) {
          console.error(err);
          alert(photoErrorMessage(file, err));
          els.status.textContent = previous || '대기 중';
        } finally {
          input.value = '';
        }
      }

      function renderBoxSelect() {
        els.boxSelect.innerHTML = app.boxes
          .map(box => `<option value="${esc(box.id)}">${esc(box.name)}</option>`)
          .join('');
      }

      function boxName(id) {
        return (app.boxes.find(box => box.id === id) || app.boxes[0] || { name: DEFAULT_BOX }).name;
      }

      function filteredItems() {
        const q = els.search.value.trim().toLowerCase();
        const items = [...app.items].sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
        if (!q) return items;
        return items.filter(item => [
          item.name,
          item.desc,
          boxName(item.boxId),
          ...(item.tags || [])
        ].join(' ').toLowerCase().includes(q));
      }

      function render() {
        renderBoxSelect();
        const items = filteredItems();
        els.metricItems.textContent = String(app.items.length);
        els.metricBoxes.textContent = String(app.boxes.length);
        els.metricPhotos.textContent = String(app.items.filter(item => item.photo).length);
        els.metricResults.textContent = String(items.length);
        els.itemsHint.textContent = els.search.value.trim() ? '검색 결과' : '최근 등록순';

        els.itemsView.classList.toggle('hidden', currentView !== 'items');
        els.boxesView.classList.toggle('hidden', currentView !== 'boxes');
        els.toolsView.classList.toggle('hidden', currentView !== 'tools');
        els.tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.view === currentView));

        renderItems(items);
        renderBoxes();
      }

      function renderItems(items) {
        if (!items.length) {
          els.itemsGrid.innerHTML = '<div class="empty">등록된 물건이 없습니다.</div>';
          return;
        }
        els.itemsGrid.innerHTML = items.map(item => `
          <article class="item-card">
            <img src="${esc(item.photo || placeholderSvg())}" alt="${esc(item.name || '물건 사진')}" />
            <div class="item-title">${esc(item.name || '이름 없음')}</div>
            <div class="item-meta">${esc(boxName(item.boxId))}</div>
            ${item.desc ? `<div class="item-meta">${esc(item.desc)}</div>` : ''}
            ${(item.tags || []).length ? `<div class="tags">${(item.tags || []).map(tag => `#${esc(tag)}`).join(' ')}</div>` : ''}
            <div class="card-actions">
              <button type="button" data-action="edit" data-id="${esc(item.id)}">수정</button>
              <button type="button" class="danger" data-action="delete" data-id="${esc(item.id)}">삭제</button>
            </div>
          </article>
        `).join('');
      }

      function renderBoxes() {
        els.boxesGrid.innerHTML = app.boxes.map(box => {
          const count = app.items.filter(item => item.boxId === box.id).length;
          return `
            <article class="box-card">
              <h3>${esc(box.name)}</h3>
              <div class="item-meta">물건 ${count}개</div>
              <button type="button" data-action="filter-box" data-box="${esc(box.name)}">이 박스 보기</button>
            </article>
          `;
        }).join('');
      }

      function resetForm() {
        editingId = '';
        currentPhoto = '';
        els.form.reset();
        els.formTitle.textContent = '물건 등록';
        renderBoxSelect();
        setPhoto('');
        els.cancelEdit.classList.add('hidden');
        els.deleteEdit.classList.add('hidden');
      }

      function saveItem(event) {
        event.preventDefault();
        const name = els.itemName.value.trim();
        if (!name) {
          alert('물건명을 입력해 주세요.');
          els.itemName.focus();
          return;
        }
        const now = Date.now();
        const payload = {
          name,
          desc: els.itemDesc.value.trim(),
          tags: splitTags(els.itemTags.value),
          boxId: els.boxSelect.value || app.boxes[0]?.id,
          photo: currentPhoto,
          updatedAt: now
        };
        if (editingId) {
          const item = app.items.find(row => row.id === editingId);
          if (item) Object.assign(item, payload);
        } else {
          app.items.unshift({ id: makeId('item'), createdAt: now, ...payload });
        }
        scheduleSave();
        resetForm();
        render();
      }

      function editItem(id) {
        const item = app.items.find(row => row.id === id);
        if (!item) return;
        editingId = item.id;
        els.formTitle.textContent = '물건 수정';
        els.itemName.value = item.name || '';
        els.itemDesc.value = item.desc || '';
        els.itemTags.value = (item.tags || []).join(', ');
        els.boxSelect.value = item.boxId || app.boxes[0]?.id || '';
        setPhoto(item.photo || '');
        els.cancelEdit.classList.remove('hidden');
        els.deleteEdit.classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function deleteItem(id) {
        const item = app.items.find(row => row.id === id);
        if (!item) return;
        if (!confirm(`${item.name || '이 물건'}을 삭제할까요?`)) return;
        app.items = app.items.filter(row => row.id !== id);
        app.deletedItems = app.deletedItems || {};
        app.deletedItems[id] = Date.now();
        scheduleSave();
        if (editingId === id) resetForm();
        render();
      }

      function addBox() {
        const name = els.newBoxName.value.trim();
        if (!name) return;
        const existing = app.boxes.find(box => box.name === name);
        if (existing) {
          els.boxSelect.value = existing.id;
          els.newBoxName.value = '';
          return;
        }
        const box = { id: makeId('box'), name, note: '', createdAt: Date.now(), updatedAt: Date.now() };
        app.boxes.push(box);
        els.newBoxName.value = '';
        render();
        els.boxSelect.value = box.id;
        scheduleSave();
      }

      function exportBackup() {
        const blob = new Blob([JSON.stringify(normalizeApp(app), null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `storage-box-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      async function importBackup(file) {
        if (!file) return;
        const data = JSON.parse(await file.text());
        if (!confirm('현재 데이터를 백업 파일로 교체할까요?')) return;
        app = normalizeApp(data);
        await writeState();
        resetForm();
        render();
        updateStatus();
      }

      async function clearAll() {
        if (!confirm('모든 물건과 보관박스를 삭제할까요?')) return;
        app = emptyApp();
        await writeState();
        resetForm();
        render();
        updateStatus();
      }

      function bindEvents() {
        els.photoInput.addEventListener('change', () => handlePhotoInput(els.photoInput));
        els.cameraInput.addEventListener('change', () => handlePhotoInput(els.cameraInput));
        els.removePhoto.addEventListener('click', () => setPhoto(''));
        els.form.addEventListener('submit', saveItem);
        els.resetForm.addEventListener('click', resetForm);
        els.cancelEdit.addEventListener('click', resetForm);
        els.deleteEdit.addEventListener('click', () => editingId && deleteItem(editingId));
        els.addBox.addEventListener('click', addBox);
        els.newBoxName.addEventListener('keydown', event => {
          if (event.key === 'Enter') {
            event.preventDefault();
            addBox();
          }
        });
        els.search.addEventListener('input', render);
        els.clearSearch.addEventListener('click', () => {
          els.search.value = '';
          render();
        });
        els.tabs.forEach(tab => tab.addEventListener('click', () => {
          currentView = tab.dataset.view || 'items';
          render();
        }));
        document.addEventListener('click', event => {
          const target = event.target.closest('[data-action]');
          if (!target) return;
          if (target.dataset.action === 'edit') editItem(target.dataset.id);
          if (target.dataset.action === 'delete') deleteItem(target.dataset.id);
          if (target.dataset.action === 'filter-box') {
            els.search.value = target.dataset.box || '';
            currentView = 'items';
            render();
          }
        });
        els.exportBtn.addEventListener('click', exportBackup);
        els.importBtn.addEventListener('click', () => els.importFile.click());
        els.importFile.addEventListener('change', () => {
          importBackup(els.importFile.files && els.importFile.files[0])
            .catch(err => alert('가져오기 실패: ' + (err.message || err)))
            .finally(() => { els.importFile.value = ''; });
        });
        els.clearAll.addEventListener('click', clearAll);
      }

      async function init() {
        bindEvents();
        await unregisterWorkers();
        app = normalizeApp(await readState());
        render();
        updateStatus();
      }

      init().catch(err => {
        console.error(err);
        els.status.textContent = '불러오기 실패';
        alert('앱을 불러오지 못했습니다: ' + (err.message || err));
      });
    })();
  </script>
</body>
</html>
